spring.application.name=hotel
spring.profiles.default=local

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Kafka base
spring.kafka.listener.missing-topics-fatal=false

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties[spring.json.trusted.packages]=com.riu.hotel.domain.model
spring.kafka.consumer.properties[spring.json.value.default.type]=com.riu.hotel.domain.model.AvailabilitySearch

# Custom
app.kafka.consumer.group-id=hotel-availability-searches-consumer2
app.kafka.topics.hotel-availability-searches=hotel_availability_searches

# SpringDoc / OpenAPI (Swagger UI)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true